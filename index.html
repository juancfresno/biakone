<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>BIAKO.</title>
  <meta name="description" content="Biako — limited 3D-printed urban objects. Underground, hand-finished, no noise.">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400&family=Instrument+Serif&display=swap" rel="stylesheet">
  <link href="https://api.fontshare.com/v2/css?f[]=switzer@300,400&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="src/styles/tokens.css">

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg-surface);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-weight: var(--weight-regular);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      min-height: 100svh;
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: var(--space-5);
      gap: var(--space-8);
    }

    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-4);
    }

    .wordmark {
      font-family: var(--font-display);
      font-size: var(--text-ui-md);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--text-primary);
      text-decoration: none;
    }

    .nav {
      display: flex;
      gap: var(--space-5);
      font-family: var(--font-ui);
      font-size: var(--text-ui-sm);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .nav a {
      color: var(--text-secondary);
      text-decoration: none;
      transition: color 120ms ease;
    }

    .nav a:hover,
    .nav a:focus-visible {
      color: var(--text-primary);
      outline: none;
    }

    .hero {
      display: grid;
      place-items: center;
      text-align: center;
      padding: var(--space-6) 0;
    }

    .hero h1 {
      margin: 0;
      font-family: var(--font-display);
      font-weight: var(--weight-regular);
      font-size: var(--text-display-xl);
      line-height: var(--leading-display);
      letter-spacing: -0.01em;
      text-transform: uppercase;
      color: var(--text-primary);
      max-width: 18ch;
    }

    .bottom {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: var(--space-4);
      font-family: var(--font-ui);
      font-size: var(--text-ui-sm);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-tertiary);
    }

    .bottom .clock { color: var(--text-secondary); }
    .bottom .credit { text-align: right; }
    .bottom .credit a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 120ms ease, color 120ms ease;
    }
    .bottom .credit a:hover,
    .bottom .credit a:focus-visible {
      color: var(--text-primary);
      border-bottom-color: var(--border-default);
      outline: none;
    }

    @media (min-width: 768px) {
      body { padding: var(--space-8); gap: var(--space-12); }
    }
  </style>
</head>
<body>

  <header class="top">
    <a class="wordmark" href="/">BIAKO.</a>
    <nav class="nav" aria-label="Primary">
      <a href="#about">About</a>
      <a href="#shop">Shop</a>
      <a href="#lab">Lab</a>
    </nav>
  </header>

  <main class="hero">
    <!-- PLACEHOLDER: replace this hero statement with the real Biako headline. -->
    <h1>Results, not promises</h1>
  </main>

  <footer class="bottom">
    <span class="clock" id="clock" aria-live="off">&mdash;</span>
    <span class="credit">&copy; 2026 &mdash; A project by <a href="https://juancfresno.com" rel="noopener">juancfresno.com</a></span>
  </footer>

  <script>
    (function () {
      const el = document.getElementById('clock');
      if (!el) return;

      const DAYS = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];
      const MONTHS = ['JAN', 'FEB', 'MAR', 'APR', 'MAY', 'JUN', 'JUL', 'AUG', 'SEP', 'OCT', 'NOV', 'DEC'];

      function pad(n) { return n < 10 ? '0' + n : '' + n; }

      function render() {
        const d = new Date();
        const day = DAYS[d.getDay()];
        const month = MONTHS[d.getMonth()];
        const date = pad(d.getDate());
        const hh = pad(d.getHours());
        const mm = pad(d.getMinutes());
        el.textContent = day + '.' + month + '.' + date + ' — ' + hh + ':' + mm;
      }

      render();
      setInterval(render, 1000 * 30);
    })();
  </script>

</body>
</html>
