<!doctype html>
<html lang="en">
<head>
  <title>BIAKO.</title>
  <!-- @include partials/head.html -->
</head>
<body data-page="home" data-barba="wrapper">

  <!-- @include partials/grain.html -->
  <!-- @include partials/nav.html -->

  <div data-barba="container" data-barba-namespace="home">
    <div class="home-bg" aria-hidden="true">
      <img class="home-bg__img" src="/home-bg.jpg" alt="" loading="eager" decoding="async">
      <div class="home-bg__overlay"></div>
    </div>

    <main class="home">
      <p class="home__bio">
        Visual Artist — Designer<br>
        ↘ Urban culture, graffiti &amp; scale work
      </p>

      <section class="home__tags" aria-label="Handstyle tags" data-marquee>
        <div class="tags__track" id="tags-track" role="list">
          <!-- tag items injected from /tags.json -->
        </div>
      </section>
    </main>

    <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer" hidden>
      <div class="lightbox__backdrop" data-lightbox-close></div>
      <figure class="lightbox__frame" id="lightbox-frame">
        <img class="lightbox__img" id="lightbox-img" alt="">
        <button class="lightbox__close" type="button" data-lightbox-close aria-label="Close">Close ✕</button>
      </figure>
    </div>
  </div>

  <!-- @include partials/footer.html -->

  <script type="module" src="/src/js/app.js"></script>
</body>
</html>
