<body data-page="lab" data-barba="wrapper">
  <!-- @include partials/grain.html -->

  <div data-barba="container" data-barba-namespace="lab" data-theme="dark">
    <main class="intro">
      <h1 class="sr-only">Lab</h1>
      <p class="intro__bio">
        Visual Artist — Designer<br>
        ↘ Urban Objects, graffiti &amp; scale work
      </p>

      <section class="lab" aria-label="Lab">
        <canvas class="lab__wave" id="lab-wave" role="img" aria-label="BIAKO"></canvas>
      </section>

      <!-- Experiments index (Figma 6221:4693). Each exercise is a hairline
           divider + Geist-Mono label + a dark CRT "screen" holding the preview
           render, linking to its own route. Staggered reveal via --rv-i (lab.js).
           Routes stub in for now; the exercise pages land in the next tasks. -->
      <section class="lab-index" aria-label="Experiments">
        <a class="lab-entry lab-entry--tags" href="/lab/tags" style="--rv-i:0">
          <span class="lab-entry__head">
            <span class="lab-entry__no">01</span>
            <span class="lab-entry__label">Tags</span>
            <span class="lab-entry__cta" aria-hidden="true">↘</span>
          </span>
          <span class="lab-entry__screen">
            <img class="lab-entry__preview" src="/lab/lab-tags.png" alt="Biako hand-painted graffiti tag" loading="lazy" decoding="async">
          </span>
        </a>
        <a class="lab-entry lab-entry--ia" href="/lab/ia" style="--rv-i:1">
          <span class="lab-entry__head">
            <span class="lab-entry__no">02</span>
            <span class="lab-entry__label">IA Experiments</span>
            <span class="lab-entry__cta" aria-hidden="true">↘</span>
          </span>
          <span class="lab-entry__screen">
            <img class="lab-entry__preview" src="/lab/lab-ia.png" alt="Biako AI-rendered 3D graffiti object" loading="lazy" decoding="async">
          </span>
        </a>
      </section>

      <!-- Experiments — playable Lab projects.
           HIDDEN for now: Vandal Rush isn't ready for the public (placeholder art).
           The game still works at /lab/vandal-rush (direct access only). To put the
           card back, remove this comment wrapper: the opening line here and the
           closing marker line at the very end of the block below.
      <section class="lab-experiments" aria-label="Experiments">
        <a class="lab-card" href="/lab/vandal-rush">
          <span class="lab-card__no">LAB / 01</span>
          <span class="lab-card__title">Vandal Rush</span>
          <span class="lab-card__tagline">“No te dejes cazar.”</span>
          <span class="lab-card__cta">
            PLAY
            <svg width="9" height="9" viewBox="0 0 9 9" fill="none" aria-hidden="true">
              <path d="M 1.5 1.5 L 7.5 7.5" stroke="currentColor" stroke-width="1.15" stroke-linecap="round"/>
              <path d="M 7.5 3.5 L 7.5 7.5 L 3.5 7.5" stroke="currentColor" stroke-width="1.15" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
        </a>
      </section>
      -->
    </main>
