       <head> between barba transitions. Page CSS is scoped by body[data-page]
       and unique class names, so loading it all together is safe. -->

  <script>
    // Theme bootstrap — set BEFORE first paint to avoid flash.
    (function () {
      try {
        var saved = localStorage.getItem('biako-theme');
        if (saved === 'dark' || saved === 'light') {
          document.documentElement.setAttribute('data-theme', saved);
        }
      } catch (e) { /* ignore — defaults to light (no attr) */ }
    })();
  </script>
