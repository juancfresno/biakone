<!doctype html>
<html lang="en">
<head>
  <title>BIAKO. — Work</title>
  <!-- @include partials/head.html -->
  <link rel="stylesheet" href="/src/styles/work.css">
</head>
<body data-page="work">
  <!-- @include partials/grain.html -->
  <!-- @include partials/nav.html -->

  <main class="intro">
    <p class="intro__bio">
      Artist — Designer<br>
      ↘ Urban culture, graffiti &amp; scale work
    </p>

    <section class="work" data-view="list">
      <div class="work__toolbar" role="toolbar" aria-label="Work view">
        <button class="work__view-btn" type="button" data-view="list" aria-pressed="true" aria-label="List view">
          <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <path d="M2 4h12M2 8h12M2 12h12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
        </button>
        <button class="work__view-btn" type="button" data-view="grid" aria-pressed="false" aria-label="Grid view">
          <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <rect x="2" y="2" width="5" height="5" stroke="currentColor" stroke-width="1.4"/>
            <rect x="9" y="2" width="5" height="5" stroke="currentColor" stroke-width="1.4"/>
            <rect x="2" y="9" width="5" height="5" stroke="currentColor" stroke-width="1.4"/>
            <rect x="9" y="9" width="5" height="5" stroke="currentColor" stroke-width="1.4"/>
          </svg>
        </button>
      </div>

      <!-- Floating centre image (active project) — populated by work.js. -->
      <div class="work__stage" id="work-stage" aria-hidden="true"></div>

      <ul class="work__list" id="work-list" role="list">
        <!-- rows injected from /work.json -->
      </ul>
      <div class="work__grid" id="work-grid">
        <!-- cells injected from /work.json -->
      </div>
    </section>
  </main>

  <!-- Detail drawer — slide-in panel opened when a project is clicked. -->
  <div class="drawer" id="work-drawer" role="dialog" aria-modal="true" aria-label="Project detail" hidden>
    <div class="drawer__gallery" id="drawer-gallery" data-drawer-scrim>
      <!-- full-height images injected per project -->
    </div>
    <button class="drawer__close" type="button" data-drawer-close aria-label="Close">Close ✕</button>
    <aside class="drawer__info" id="drawer-info">
      <div class="drawer__info-head">
        <span class="drawer__title">
          <span class="drawer__arrow" aria-hidden="true">↘</span>
          <span class="drawer__code" data-code></span>
          <span class="drawer__name" data-name></span>
        </span>
        <span class="drawer__spec">
          <span data-scale></span>
          <span data-date></span>
        </span>
      </div>
      <p class="drawer__desc" data-desc></p>
      <div class="drawer__pager">
        <button class="drawer__pg" type="button" data-prev>Previous</button>
        <button class="drawer__pg" type="button" data-next>Next</button>
      </div>
    </aside>
  </div>

  <!-- @include partials/footer.html -->

  <script type="module" src="/src/js/shell.js"></script>
  <script type="module" src="/src/js/work.js"></script>
</body>
</html>
