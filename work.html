<!doctype html>
<html lang="en">
<head>
  <title>Work — Biakone</title>
  <meta name="description" content="Explore Biakone's archive of urban objects, scale pieces, miniatures, graffiti works, art toys and physical experiments.">
  <link rel="canonical" href="https://biakone.com/work">
  <meta property="og:title" content="Work — Biakone">
  <meta property="og:description" content="Explore Biakone's archive of urban objects, scale pieces, miniatures, graffiti works, art toys and physical experiments.">
  <meta property="og:url" content="https://biakone.com/work">
  <meta name="twitter:title" content="Work — Biakone">
  <meta name="twitter:description" content="Explore Biakone's archive of urban objects, scale pieces, miniatures, graffiti works, art toys and physical experiments.">
  <!-- @include partials/head.html -->
</head>
<body data-page="work" data-barba="wrapper">
  <!-- @include partials/grain.html -->
  <!-- @include partials/nav.html -->

  <div data-barba="container" data-barba-namespace="work">
    <main class="intro">
      <h1 class="sr-only">Work</h1>
      <header class="work-head">
        <p class="intro__bio">
          Visual Artist — Designer<br>
          ↘ Urban culture, graffiti &amp; scale work
        </p>

        <div class="work__toolbar" role="toolbar" aria-label="Work view">
          <button class="work__view-btn" type="button" data-view="list" aria-pressed="true" aria-label="List view">
            <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
              <path d="M2 4h12M2 8h12M2 12h12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
          </button>
          <button class="work__view-btn" type="button" data-view="grid" aria-pressed="false" aria-label="Grid view">
            <svg viewBox="0 0 16 16" fill="none" aria-hidden="true">
              <rect x="2" y="2" width="5" height="5" stroke="currentColor" stroke-width="1.4"/>
              <rect x="9" y="2" width="5" height="5" stroke="currentColor" stroke-width="1.4"/>
              <rect x="2" y="9" width="5" height="5" stroke="currentColor" stroke-width="1.4"/>
              <rect x="9" y="9" width="5" height="5" stroke="currentColor" stroke-width="1.4"/>
            </svg>
          </button>
        </div>
      </header>

      <section class="work" data-view="list">
        <!-- Floating centre image (active project) — populated by work.js. -->
        <div class="work__stage" id="work-stage" aria-hidden="true"></div>

        <ul class="work__list" id="work-list" role="list">
          <!-- rows injected from /work.json -->
        </ul>
        <div class="work__grid" id="work-grid">
          <!-- cells injected from /work.json -->
        </div>
      </section>
    </main>

    <!-- Detail takeover — FULLSCREEN glitch entrance. On open it clip-path-slice
         glitches in (Codrops "Glitch Slideshow" technique, ported in work.js +
         work.css: stacked clones of .drawer__stage, RGB-tinted + offset, animated
         clip-path slices, then removed → one clean layer). Covers the fixed shell.
         data-mode kept as the Phase-2 hook. -->
    <div class="drawer" id="work-drawer" role="dialog" aria-modal="true" aria-label="Project detail" data-mode="gallery" hidden>
      <div class="drawer__backdrop" data-drawer-close aria-hidden="true"></div>

      <!-- Cloneable content: the glitch-in duplicates THIS stage into transient
           layers, then removes them (no permanent triple-render). The chrome below
           lives OUTSIDE the stage so it's never cloned or glitched. -->
      <div class="drawer__panel" id="drawer-panel">
        <div class="drawer__stage" id="drawer-stage">
          <!-- Horizontal gallery: full-height images, drag/scroll; edge zones act as
               prev/next image (see work.js). Each slide carries data-img-index so
               Phase 2 can promote one to a full-height slider without a rebuild. -->
          <!-- data-lenis-prevent: the drawer's own scroll containers. While the
               takeover is open Lenis is stopped to lock the BACKGROUND page, but a
               stopped Lenis preventDefault()s every touchmove — which would freeze
               this gallery's native vertical scroll on touch. The attribute tells
               Lenis to leave native scrolling here alone. -->
          <div class="drawer__gallery" id="drawer-gallery" data-lenis-prevent>
            <!-- slides injected per project -->
          </div>

          <!-- Floating dark info box — Figma 6214:4165. Header (↘ NN. name · type
               | year), divider, description + Materials/Scale/Status, divider,
               Previous / Next between PROJECTS. -->
          <aside class="drawer__info" id="drawer-info" data-lenis-prevent>
            <div class="drawer__info-head">
              <span class="drawer__title">
                <span class="drawer__arrow" aria-hidden="true">↘</span>
                <span class="drawer__code" data-code></span>
                <span class="drawer__name" data-name></span>
                <span class="drawer__type" data-type></span>
              </span>
              <span class="drawer__year" data-year></span>
            </div>
            <div class="drawer__info-body">
              <p class="drawer__desc" data-desc></p>
              <dl class="drawer__details" data-details></dl>
            </div>
            <div class="drawer__pager">
              <button class="nav-link drawer__pg" type="button" data-prev>← Previous</button>
              <button class="nav-link drawer__pg" type="button" data-next>Next →</button>
            </div>
          </aside>
        </div>
        <!-- CRT power-on/off flash overlay — a bright band that expands from a
             center line to fill (turn-on), or collapses back to it (turn-off).
             Purely a lighting layer; the content sits below it (see work.css). -->
        <div class="drawer__crt" aria-hidden="true"></div>
      </div>

      <!-- Chrome — direct children of .drawer so they pin to the viewport corners
           and sit ABOVE the glitch layers (never cloned). ESC label top-left, ✕
           top-right (shared overlay controls, cream ink on the dark takeover). -->
      <span class="overlay-esc-hint" aria-hidden="true">Esc to exit</span>
      <button class="nav-link overlay-close" type="button" data-drawer-close aria-label="Close">
        <span>Close</span>
        <svg class="nav-arrow" width="9" height="9" viewBox="0 0 9 9" fill="none" aria-hidden="true">
          <path class="shaft" d="M 2 2 L 7 7" stroke="currentColor" stroke-width="1.15" stroke-linecap="round"/>
          <path class="head"  d="M 7 2 L 2 7" stroke="currentColor" stroke-width="1.15" stroke-linecap="round"/>
        </svg>
      </button>

      <!-- REW/FF navigation cursor — a pill that replaces the cursor over the
           gallery; its label (◀◀ REW / FF ▶▶) and left/right click zones are set
           in work.js. Direct child of .drawer (no transform) so its fixed
           positioning maps to viewport clientX/clientY. -->
      <div class="drawer__cursor" id="drawer-cursor" aria-hidden="true"></div>
    </div>
  </div>

  <!-- @include partials/footer.html -->

  <script type="module" src="/src/js/app.js"></script>
</body>
</html>
